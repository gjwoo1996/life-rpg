name: Build Windows

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "버전 자릿수 선택 (선택한 자릿수만 올리고 오른쪽은 0으로)"
        required: true
        type: choice
        options:
          - major
          - minor
          - patch
        default: patch

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Determine version
        id: version
        run: node scripts/determine-version.cjs
        env:
          BUMP_TYPE: ${{ github.event.inputs.bump_type }}

      - name: Set app version (tauri.conf.json, Cargo.toml, package.json)
        run: node scripts/set-app-version.cjs
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri (Windows)
        run: npx tauri build
        env:
          CI: false

      - name: Upload exe and installer
        uses: actions/upload-artifact@v4
        with:
          name: life-rpg-windows-v${{ steps.version.outputs.version }}
          path: |
            src-tauri/target/release/life-rpg.exe
            src-tauri/target/release/bundle/nsis/
