name: Build Windows

on:
  workflow_dispatch:
    inputs:
      version:
        description: "App version (used in bundle and artifact name)"
        required: false
        default: "0.1.0"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Set app version
        run: node -e "const fs=require('fs'); const p='src-tauri/tauri.conf.json'; const j=JSON.parse(fs.readFileSync(p,'utf8')); j.version=process.env.VERSION; fs.writeFileSync(p, JSON.stringify(j,null,2));"
        env:
          VERSION: ${{ github.event.inputs.version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri (Windows)
        run: npx tauri build
        env:
          CI: false

      - name: Upload exe and installer
        uses: actions/upload-artifact@v4
        with:
          name: life-rpg-windows-v${{ github.event.inputs.version }}
          path: |
            src-tauri/target/release/life-rpg.exe
            src-tauri/target/release/bundle/nsis/
