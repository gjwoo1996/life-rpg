name: Build Windows

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "버전 자릿수 선택 (선택한 자릿수만 올리고 오른쪽은 0으로)"
        required: true
        type: choice
        options:
          - major
          - minor
          - patch
        default: patch

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Determine version
        id: version
        run: node -e "const fs=require('fs');const b=process.env.BUMP_TYPE;const c=JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8'));let [m,n,p]=c.version.split('.').map(s=>parseInt(s,10)||0);if(b==='major'){m++;n=0;p=0;}else if(b==='minor'){n++;p=0;}else{p++;}const v=[m,n,p].join('.');fs.appendFileSync(process.env.GITHUB_OUTPUT,'version='+v+'\n');"
        env:
          BUMP_TYPE: ${{ github.event.inputs.bump_type }}

      - name: Set app version (tauri.conf.json, Cargo.toml, package.json)
        run: node -e "const fs=require('fs');const v=process.env.VERSION;const t=JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8'));t.version=v;fs.writeFileSync('src-tauri/tauri.conf.json',JSON.stringify(t,null,2));let c=fs.readFileSync('src-tauri/Cargo.toml','utf8');c=c.replace(/^version\\s*=\\s*\"[^\"]+\"/m,'version = \"'+v+'\"');fs.writeFileSync('src-tauri/Cargo.toml',c);const p=JSON.parse(fs.readFileSync('package.json','utf8'));p.version=v;fs.writeFileSync('package.json',JSON.stringify(p,null,2));"
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri (Windows)
        run: npx tauri build
        env:
          CI: false

      - name: Upload exe and installer
        uses: actions/upload-artifact@v4
        with:
          name: life-rpg-windows-v${{ steps.version.outputs.version }}
          path: |
            src-tauri/target/release/life-rpg.exe
            src-tauri/target/release/bundle/nsis/
